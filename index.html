<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>กราฟ Sin — อนิเมชั่นเชิงโต้ตอบ</title>
<!-- เพิ่ม MathJax สำหรับแสดงสมการคณิตศาสตร์ -->
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
  :root {
    --bg:#0b0f1a; --surface:#111827; --card:#1a2236; --border:#243048;
    --accent:#38bdf8; --accent2:#818cf8; --accent3:#fb7185; --green:#34d399;
    --text:#e2e8f0; --muted:#64748b; --label:#94a3b8;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Sarabun',sans-serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px 16px 60px; }

  header { text-align:center; margin-bottom:28px; }
  header h1 { font-size:clamp(1.5rem,4vw,2.3rem); font-weight:700; letter-spacing:-0.02em;
    background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text;
    -webkit-text-fill-color:transparent; background-clip:text; }
  header p { color:var(--muted); margin-top:6px; font-size:.9rem; }
  
  /* ปรับแต่งส่วนแสดงสมการ */
  .math-display { margin-top:20px; background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:20px; font-size:1.5rem; text-align:center; color:var(--text); }

  .main-grid { width:100%; max-width:1120px; display:grid; grid-template-columns:1fr 320px; gap:20px; }
  @media(max-width:820px){ .main-grid{grid-template-columns:1fr;} }

  /* Canvas card */
  .canvas-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px; }
  canvas { width:100%; display:block; border-radius:8px; }
  #waveCanvas { height:340px; }

  /* ... (ส่วน CSS อื่นๆ คงเดิม) ... */
</style>
</head>
<body>

<header>
  <h1>กราฟ Sine เชิงโต้ตอบ</h1>
  <p>ปรับพารามิเตอร์เพื่อดูลักษณะสมการทางคณิตศาสตร์</p>
  
  <!-- แสดงสมการแบบ LaTeX -->
  <div class="math-display">
    $$y = A \cdot \sin(Bx + C) + D$$
    <div id="equation" style="color: var(--accent); font-size: 1.2rem; margin-top: 10px;">
      $$y = 1.00 \cdot \sin(1.00x + 0.00) + 0.00$$
    </div>
  </div>
</header>

<div class="main-grid">
  <!-- LEFT: Main canvas -->
  <div>
    <div class="canvas-card">
      <canvas id="waveCanvas"></canvas>
      <!-- ... (ส่วน Playbar และ Readout คงเดิม) ... -->
    </div>
  </div>

  <!-- RIGHT: Controls -->
  <div class="panel">
    <!-- ... (ส่วน Controls คงเดิม) ... -->
  </div>
</div>

<script>
// ส่วนของ Logic คงเดิม แต่เพิ่มการสั่ง Update MathJax
let A = 1, B = 1, C = 0, D = 0;
// ... (ตัวแปรอื่นๆ คงเดิม)

function updateFormula() {
  const Cpi = C/Math.PI;
  // สร้าง String สำหรับแสดงใน MathJax
  const cStr = Math.abs(Cpi)>0.005 ? (C>=0 ? `+ ${Cpi.toFixed(2)}\\pi` : `- ${Math.abs(Cpi).toFixed(2)}\\pi`) : "";
  const dStr = Math.abs(D)>0.005 ? (D>=0 ? `+ ${D.toFixed(2)}` : `- ${Math.abs(D).toFixed(2)}`) : "";
  
  const latex = `$$y = ${A.toFixed(2)} \\cdot \\sin(${B.toFixed(2)}x ${cStr}) ${dStr}$$`;
  document.getElementById('equation').innerHTML = latex;
  
  // สั่งให้ MathJax Render ใหม่
  if(window.MathJax) {
    MathJax.typesetPromise([document.getElementById('equation')]);
  }

  // อัปเดต Readout อื่นๆ...
}

// ... (ฟังก์ชันที่เหลือเหมือนเดิม)
</script>
</body>
</html>
